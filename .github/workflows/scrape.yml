name: Daily Scrape & Summarize

on:
  schedule:
    - cron: "0 22 * * *"   # 毎日 22:00 UTC = 翌朝 07:00 JST
  workflow_dispatch:         # 手動実行

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run batch (scrape + summarize + save)
        env:
          LIBECITY_EMAIL:    ${{ secrets.LIBECITY_EMAIL }}
          LIBECITY_PASSWORD: ${{ secrets.LIBECITY_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/batch.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/*.png
          if-no-files-found: ignore

      - name: Commit and push generated JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summaries/
          # 変更がある場合のみコミット
          git diff --cached --quiet || \
            git commit -m "chore: add daily summary $(date +'%Y-%m-%d' -d '+9 hours')"
          git push
