name: Deploy to GitHub Pages

on:
  push:
    branches: [main]   # main に push されるたびに自動デプロイ
  workflow_dispatch:    # 手動実行も可能

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを防ぐ（実行中のデプロイは中断しない）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # GITHUB_ACTIONS=true は Actions 環境で自動セットされるため
        # next.config.mjs が自動で basePath=/libecity-digest を適用する

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
